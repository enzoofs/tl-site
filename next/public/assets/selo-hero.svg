<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Marca TimeLabs">
  <!-- fundo transparente -->

  <g transform="translate(300,300)">
    <!-- anéis concentricos -->
    <circle r="240" fill="none" stroke="#2B2520" stroke-width="0.6"/>
    <circle r="232" fill="none" stroke="#2B2520" stroke-width="1.4"/>
    <circle r="195" fill="none" stroke="#2B2520" stroke-width="0.5"/>

    <!-- 4 marcas cardinais douradas -->
    <g fill="#E0B03A">
      <circle cx="0" cy="-216" r="4"/>
      <circle cx="216" cy="0" r="4"/>
      <circle cx="0" cy="216" r="4"/>
      <circle cx="-216" cy="0" r="4"/>
    </g>

    <!-- 6 vertices hexagonais com micro-pontos -->
    <g fill="#2B2520">
      <circle cx="0" cy="-145" r="2.5"/>
      <circle cx="125" cy="-72" r="2.5"/>
      <circle cx="125" cy="72" r="2.5"/>
      <circle cx="0" cy="145" r="2.5"/>
      <circle cx="-125" cy="72" r="2.5"/>
      <circle cx="-125" cy="-72" r="2.5"/>
    </g>

    <!-- Linhas radiais sutis do hex pro centro -->
    <g stroke="#2B2520" stroke-width="0.3" opacity="0.45">
      <line x1="0" y1="-132" x2="0" y2="-85"/>
      <line x1="114" y1="-66" x2="72" y2="-42"/>
      <line x1="114" y1="66" x2="72" y2="42"/>
      <line x1="0" y1="132" x2="0" y2="85"/>
      <line x1="-114" y1="66" x2="-72" y2="42"/>
      <line x1="-114" y1="-66" x2="-72" y2="-42"/>
    </g>

    <!-- Hexagono central -->
    <polygon points="85,0 42.5,-73.6 -42.5,-73.6 -85,0 -42.5,73.6 42.5,73.6"
             fill="#EFE9DA" stroke="#2B2520" stroke-width="2.2"/>
    <polygon points="80,0 40,-69.3 -40,-69.3 -80,0 -40,69.3 40,69.3"
             fill="none" stroke="#2B2520" stroke-width="0.5"/>

    <!-- Gota dourada central -->
    <circle r="25" fill="#E0B03A"/>
    <circle r="25" fill="none" stroke="#2B2520" stroke-width="1.2"/>

    <!-- Centro limpo -->
  </g>
</svg>
