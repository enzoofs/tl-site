<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300">
  <rect width="700" height="300" fill="#F5F2EA"/>

  <!-- Simbolo: silhueta abstrata — so topo do hex superior + base do hex inferior + nucleo vertical -->
  <g transform="translate(80,80)">
    <!-- arco superior (topo do hex de cima) -->
    <polyline points="0,70 30,18 90,18 120,70"
              fill="none" stroke="#2B2B2B" stroke-width="4"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- arco inferior (base do hex de baixo) -->
    <polyline points="0,70 30,122 90,122 120,70"
              fill="none" stroke="#2B2B2B" stroke-width="4"
              stroke-linecap="round" stroke-linejoin="round"
              transform="translate(0,30)"/>
    <!-- nucleo: traco vertical amarelo no centro -->
    <line x1="60" y1="55" x2="60" y2="147" stroke="#F5C842" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, Montserrat, sans-serif">
    <text x="260" y="165" font-size="68" font-weight="600" fill="#F5C842">time</text>
    <text x="405" y="165" font-size="68" font-weight="300" fill="#2B2B2B">labs</text>
  </g>
  <text x="260" y="195" font-family="Inter, sans-serif" font-size="11"
        fill="#6B6B6B" letter-spacing="3">A ALQUIMIA DO TEMPO</text>
</svg>
