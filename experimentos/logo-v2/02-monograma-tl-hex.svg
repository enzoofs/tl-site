<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <rect width="700" height="400" fill="#F5F2EA"/>

  <!-- T formado por hexagono: topo do hex = barra do T, haste amarela -->
  <g transform="translate(80,100)">
    <polygon points="60,0 30,-52 -30,-52 -60,0 -30,52 30,52"
             fill="none" stroke="#2B2B2B" stroke-width="4"/>
    <!-- barra do T: aresta superior (entre os 2 vertices de cima) reforcada -->
    <line x1="-30" y1="-52" x2="30" y2="-52" stroke="#2B2B2B" stroke-width="8" stroke-linecap="square"/>
    <!-- haste do T: linha vertical central amarela (nucleo) -->
    <line x1="0" y1="-52" x2="0" y2="52" stroke="#F5C842" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- L formado por hexagono: face esquerda + base -->
  <g transform="translate(240,100)">
    <polygon points="60,0 30,-52 -30,-52 -60,0 -30,52 30,52"
             fill="none" stroke="#2B2B2B" stroke-width="4"/>
    <!-- corpo do L: aresta esquerda + base reforcadas -->
    <polyline points="-30,-52 -60,0 -30,52 30,52"
              fill="none" stroke="#2B2B2B" stroke-width="8"
              stroke-linecap="square" stroke-linejoin="miter"/>
    <!-- nucleo vertical amarelo -->
    <line x1="-30" y1="-20" x2="-30" y2="30" stroke="#F5C842" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Wordmark ao lado -->
  <g font-family="Inter, Montserrat, sans-serif">
    <text x="360" y="185" font-size="72" font-weight="600" fill="#F5C842">time</text>
    <text x="515" y="185" font-size="72" font-weight="300" fill="#2B2B2B">labs</text>
  </g>
  <text x="360" y="215" font-family="Inter, sans-serif" font-size="11"
        fill="#6B6B6B" letter-spacing="3">A ALQUIMIA DO TEMPO</text>
</svg>
