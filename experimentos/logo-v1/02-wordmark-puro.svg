<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <rect width="600" height="240" fill="#F5F2EA"/>
  <!-- Wordmark refinado -->
  <g font-family="Inter, Montserrat, sans-serif">
    <text x="100" y="140" font-size="72" font-weight="600" fill="#F5C842">time</text>
    <text x="280" y="140" font-size="72" font-weight="300" fill="#2B2B2B">labs</text>
    <!-- indicador de fluxo/proximo: chevron -->
    <polyline points="450,110 475,130 450,150"
              fill="none" stroke="#F5C842" stroke-width="4"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- tagline sutil -->
  <text x="102" y="175" font-family="Inter, sans-serif" font-size="11"
        fill="#6B6B6B" letter-spacing="3" font-weight="400">
    A ALQUIMIA DO TEMPO PARA EMPRESAS
  </text>
  <!-- linha fina de ancoragem -->
  <line x1="100" y1="155" x2="440" y2="155" stroke="#E8E4D8" stroke-width="1"/>
</svg>
