<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <rect width="700" height="500" fill="#E8E2D0"/>

  <!-- Grid blueprint sutil -->
  <g stroke="#2B2B2B" stroke-width="0.3" opacity="0.25">
    <g id="grid">
      <line x1="0" y1="50" x2="700" y2="50"/>
      <line x1="0" y1="100" x2="700" y2="100"/>
      <line x1="0" y1="150" x2="700" y2="150"/>
      <line x1="0" y1="200" x2="700" y2="200"/>
      <line x1="0" y1="250" x2="700" y2="250"/>
      <line x1="0" y1="300" x2="700" y2="300"/>
      <line x1="0" y1="350" x2="700" y2="350"/>
      <line x1="0" y1="400" x2="700" y2="400"/>
      <line x1="0" y1="450" x2="700" y2="450"/>
      <line x1="50" y1="0" x2="50" y2="500"/>
      <line x1="100" y1="0" x2="100" y2="500"/>
      <line x1="150" y1="0" x2="150" y2="500"/>
      <line x1="200" y1="0" x2="200" y2="500"/>
      <line x1="250" y1="0" x2="250" y2="500"/>
      <line x1="300" y1="0" x2="300" y2="500"/>
      <line x1="350" y1="0" x2="350" y2="500"/>
      <line x1="400" y1="0" x2="400" y2="500"/>
      <line x1="450" y1="0" x2="450" y2="500"/>
      <line x1="500" y1="0" x2="500" y2="500"/>
      <line x1="550" y1="0" x2="550" y2="500"/>
      <line x1="600" y1="0" x2="600" y2="500"/>
      <line x1="650" y1="0" x2="650" y2="500"/>
    </g>
  </g>

  <!-- Moldura/frame do codice -->
  <rect x="40" y="40" width="620" height="420" fill="none"
        stroke="#2B2B2B" stroke-width="1.2"/>
  <rect x="46" y="46" width="608" height="408" fill="none"
        stroke="#2B2B2B" stroke-width="0.4"/>

  <!-- HEXAGONO CENTRAL - corpo do diagrama -->
  <g transform="translate(350,250)">
    <polygon points="120,0 60,-104 -60,-104 -120,0 -60,104 60,104"
             fill="none" stroke="#2B2B2B" stroke-width="2"/>
    <!-- diagonais cruzando (construcao) -->
    <g stroke="#2B2B2B" stroke-width="0.5" opacity="0.6" stroke-dasharray="3 3">
      <line x1="-120" y1="0" x2="120" y2="0"/>
      <line x1="0" y1="-104" x2="0" y2="104"/>
    </g>
    <!-- ponto central + 6 pontos nos vertices -->
    <g fill="#2B2B2B">
      <circle r="3"/>
      <circle cx="120" cy="0" r="2"/><circle cx="-120" cy="0" r="2"/>
      <circle cx="60" cy="-104" r="2"/><circle cx="-60" cy="-104" r="2"/>
      <circle cx="60" cy="104" r="2"/><circle cx="-60" cy="104" r="2"/>
    </g>
    <!-- monograma TL inscrito -->
    <text x="0" y="18" text-anchor="middle"
          font-family="'GT Sectra', Georgia, serif"
          font-size="80" font-weight="500" fill="#2B2B2B">TL</text>
    <!-- nucleo amarelo -->
    <circle r="10" fill="#E8B84A" stroke="#2B2B2B" stroke-width="1" cx="50" cy="-30"/>
  </g>

  <!-- Cotas (dimensioning lines) - estilo engenharia -->
  <g stroke="#2B2B2B" stroke-width="0.6" fill="none">
    <!-- cota horizontal superior: largura -->
    <line x1="230" y1="120" x2="470" y2="120"/>
    <line x1="230" y1="115" x2="230" y2="125"/>
    <line x1="470" y1="115" x2="470" y2="125"/>
  </g>
  <text x="350" y="112" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="10"
        fill="#2B2B2B">R = 120</text>

  <!-- cota vertical direita -->
  <g stroke="#2B2B2B" stroke-width="0.6">
    <line x1="490" y1="146" x2="490" y2="354"/>
    <line x1="485" y1="146" x2="495" y2="146"/>
    <line x1="485" y1="354" x2="495" y2="354"/>
  </g>
  <text x="502" y="254"
        font-family="'IBM Plex Mono', monospace" font-size="10"
        fill="#2B2B2B">h = 208</text>

  <!-- angulo marker -->
  <g transform="translate(410,146)" stroke="#2B2B2B" stroke-width="0.5" fill="none">
    <path d="M 0,0 A 20,20 0 0,1 -10,17" />
  </g>
  <text x="395" y="168"
        font-family="'IBM Plex Mono', monospace" font-size="9"
        fill="#2B2B2B">60°</text>

  <!-- Cabecalho do blueprint -->
  <g>
    <rect x="46" y="46" width="608" height="30" fill="#2B2B2B"/>
    <text x="60" y="66" font-family="'IBM Plex Mono', monospace"
          font-size="10" fill="#EFE9DA" letter-spacing="3">
      TIMELABS · SCHEMATIC 001
    </text>
    <text x="640" y="66" text-anchor="end"
          font-family="'IBM Plex Mono', monospace"
          font-size="10" fill="#E0B03A" letter-spacing="3">
      REV.A · 2026.04
    </text>
  </g>

  <!-- Rodape tecnico -->
  <g font-family="'IBM Plex Mono', monospace" font-size="9"
     fill="#2B2B2B" letter-spacing="2">
    <text x="60" y="440">ESCALA 1:1</text>
    <text x="220" y="440">MATERIAL: CODEX</text>
    <text x="400" y="440">DES. TIMELABS LAB</text>
    <text x="640" y="440" text-anchor="end">FOLHA 01 / 01</text>
  </g>
</svg>
