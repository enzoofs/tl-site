<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.7" numOctaves="2" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.14  0 0 0 0 0.11  0 0 0 0 0.08  0 0 0 0.05 0"/>
    </filter>
  </defs>
  <rect width="1600" height="1100" fill="#EFE9DA"/>
  <rect width="1600" height="1100" filter="url(#paper)"/>

  <!-- Moldura dupla -->
  <rect x="70" y="70" width="1460" height="960" fill="none" stroke="#2B2520" stroke-width="0.8"/>
  <rect x="78" y="78" width="1444" height="944" fill="none" stroke="#2B2520" stroke-width="0.3"/>

  <!-- Cabecalho -->
  <text x="90" y="118" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">TIMELABS · MARCA</text>
  <text x="1510" y="118" text-anchor="end" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">FOLIO 01 / 10</text>
  <line x1="90" y1="136" x2="1510" y2="136" stroke="#2B2520" stroke-width="0.4"/>

  <!-- SELO CENTRAL: miniatura da marca A -->
  <g transform="translate(800,420) scale(0.95)">
    <circle r="220" fill="none" stroke="#2B2520" stroke-width="0.8"/>
    <circle r="215" fill="none" stroke="#2B2520" stroke-width="1.6"/>
    <circle r="180" fill="none" stroke="#2B2520" stroke-width="0.6"/>
    <!-- glifos nos 6 vertices -->
    <g stroke="#2B2520" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <g transform="translate(0,-145)"><polygon points="0,-13 11,8 -11,8"/><line x1="-14" y1="-2" x2="14" y2="-2"/></g>
      <g transform="translate(125,-72)"><line x1="-11" y1="8" x2="0" y2="-10"/><line x1="0" y1="-10" x2="11" y2="8"/><line x1="-11" y1="8" x2="11" y2="8"/><circle cx="-11" cy="8" r="2.5" fill="#2B2520"/><circle cx="11" cy="8" r="2.5" fill="#2B2520"/><circle cx="0" cy="-10" r="2.5" fill="#2B2520"/></g>
      <g transform="translate(125,72)"><polygon points="0,-10 11,0 0,10 -11,0"/><line x1="-6" y1="0" x2="6" y2="0"/></g>
      <g transform="translate(0,145)"><ellipse rx="13" ry="7"/><circle r="3"/><line x1="0" y1="-11" x2="0" y2="-7"/><line x1="0" y1="7" x2="0" y2="11"/></g>
      <g transform="translate(-125,72)"><path d="M 10,0 A 10,10 0 1,1 0,-10"/><polyline points="-4,-12 0,-10 -2,-6"/></g>
      <g transform="translate(-125,-72)"><line x1="0" y1="-10" x2="0" y2="10"/><path d="M 0,-10 L -12,-7 L -12,11 L 0,10"/><path d="M 0,-10 L 12,-7 L 12,11 L 0,10"/></g>
    </g>
    <g stroke="#2B2520" stroke-width="0.35" opacity="0.55">
      <line x1="0" y1="-132" x2="0" y2="-80"/><line x1="114" y1="-66" x2="70" y2="-41"/>
      <line x1="114" y1="66" x2="70" y2="41"/><line x1="0" y1="132" x2="0" y2="80"/>
      <line x1="-114" y1="66" x2="-70" y2="41"/><line x1="-114" y1="-66" x2="-70" y2="-41"/>
    </g>
    <polygon points="80,0 40,-69.3 -40,-69.3 -80,0 -40,69.3 40,69.3" fill="#EFE9DA" stroke="#2B2520" stroke-width="2.2"/>
    <circle r="22" fill="#E0B03A"/>
    <circle r="22" fill="none" stroke="#2B2520" stroke-width="1.2"/>
    <text x="0" y="11" text-anchor="middle" font-family="'Gloock', 'IBM Plex Serif', serif" font-size="40" fill="#2B2520">TL</text>
  </g>

  <!-- Titulo editorial -->
  <text x="800" y="800" text-anchor="middle" font-family="'Gloock', 'IBM Plex Serif', serif" font-size="78" fill="#2B2520">Codex Operandi</text>
  <text x="800" y="855" text-anchor="middle" font-family="'Instrument Serif', 'IBM Plex Serif', serif" font-style="italic" font-size="32" fill="#2B2520">manual de marca &amp; sistema visual</text>

  <line x1="640" y1="905" x2="960" y2="905" stroke="#2B2520" stroke-width="0.5"/>

  <text x="800" y="940" text-anchor="middle" font-family="'IBM Plex Mono'" font-size="13" fill="#2B2520" letter-spacing="6">TIMELABS · EST. MMXXVI</text>
  <text x="800" y="965" text-anchor="middle" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4" opacity="0.7">A ALQUIMIA DO TEMPO PARA EMPRESAS</text>

  <!-- Footer -->
  <line x1="90" y1="990" x2="1510" y2="990" stroke="#2B2520" stroke-width="0.4"/>
  <text x="90" y="1012" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520" letter-spacing="3">TIMELABSBR.COM</text>
  <text x="1510" y="1012" text-anchor="end" font-family="'Instrument Serif'" font-style="italic" font-size="14" fill="#2B2520">I</text>
</svg>
