    <text x="0" y="0" fill="#E0B03A">· FICHA CATALOGRAL</text>
    <text x="0" y="30">TITULO ··········· CODEX OPERANDI</text>
    <text x="0" y="50">EDICAO ··········· I / MMXXVI</text>
    <text x="0" y="70">LOCAL ············ SAO PAULO · BRASIL</text>
    <text x="0" y="90">DOMINIO ·········· TIMELABSBR.COM</text>
    <text x="0" y="110">TIPOS ············ GLOOCK · PLEX · INSTRUMENT</text>
    <text x="0" y="130">COMPOSICAO ······· SVG · RSVG · CAIRO</text>
    <text x="0" y="150">CORES ············ #EFE9DA #2B2520 #E0B03A #6B6258</text>
  </g>

  <text x="800" y="950" text-anchor="middle" font-family="'Instrument Serif', serif" font-style="italic" font-size="18" fill="#6B6258">nada foi gerado. tudo foi lavrado.</text>

  <line x1="90" y1="990" x2="1510" y2="990" stroke="#2B2520" stroke-width="0.4"/>
  <text x="90" y="1012" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520" letter-spacing="3">TIMELABSBR.COM</text>
  <text x="1510" y="1012" text-anchor="end" font-family="'Instrument Serif'" font-style="italic" font-size="14" fill="#2B2520">X</text>
