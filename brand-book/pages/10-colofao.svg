<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs><filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="1.7" numOctaves="2" seed="10"/><feColorMatrix values="0 0 0 0 0.14  0 0 0 0 0.11  0 0 0 0 0.08  0 0 0 0.05 0"/></filter></defs>
  <rect width="1600" height="1100" fill="#EFE9DA"/>
  <rect width="1600" height="1100" filter="url(#paper)"/>

  <text x="90" y="118" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">TIMELABS · COLOFON</text>
  <text x="1510" y="118" text-anchor="end" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">FOLIO 10 / 10</text>
  <line x1="90" y1="136" x2="1510" y2="136" stroke="#2B2520" stroke-width="0.4"/>

  <text x="800" y="260" text-anchor="middle" font-family="'IBM Plex Mono'" font-size="12" fill="#E0B03A" letter-spacing="8">§ X · COLOFON</text>

  <!-- Ornamento central: pequeno selo -->
  <g transform="translate(800,430)">
    <circle r="110" fill="none" stroke="#2B2520" stroke-width="0.8"/>
    <circle r="105" fill="none" stroke="#2B2520" stroke-width="1.5"/>
    <polygon points="44,0 22,-38 -22,-38 -44,0 -22,38 22,38" fill="#EFE9DA" stroke="#2B2520" stroke-width="1.2"/>
    <circle r="13" fill="#E0B03A" stroke="#2B2520" stroke-width="1"/>
    <text x="0" y="7" text-anchor="middle" font-family="'Gloock', serif" font-size="22" fill="#2B2520">TL</text>
  </g>

  <text x="800" y="620" text-anchor="middle" font-family="'Gloock', serif" font-size="54" fill="#2B2520">Codex Operandi</text>
  <text x="800" y="665" text-anchor="middle" font-family="'Instrument Serif', serif" font-style="italic" font-size="22" fill="#2B2520">manual de marca · primeira edicao</text>

  <line x1="640" y1="700" x2="960" y2="700" stroke="#2B2520" stroke-width="0.5"/>

