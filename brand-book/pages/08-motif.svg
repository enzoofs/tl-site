<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs><filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="1.7" numOctaves="2" seed="8"/><feColorMatrix values="0 0 0 0 0.14  0 0 0 0 0.11  0 0 0 0 0.08  0 0 0 0.05 0"/></filter></defs>
  <rect width="1600" height="1100" fill="#EFE9DA"/>
  <rect width="1600" height="1100" filter="url(#paper)"/>

  <text x="90" y="118" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">TIMELABS · MOTIF &amp; CONSTRUCAO</text>
  <text x="1510" y="118" text-anchor="end" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">FOLIO 08 / 10</text>
  <line x1="90" y1="136" x2="1510" y2="136" stroke="#2B2520" stroke-width="0.4"/>

  <text x="90" y="210" font-family="'IBM Plex Mono'" font-size="12" fill="#E0B03A" letter-spacing="8">§ VIII · GEOMETRIA</text>
  <text x="90" y="290" font-family="'Gloock', serif" font-size="56" fill="#2B2520">O hexagono.</text>
  <text x="90" y="335" font-family="'Instrument Serif', serif" font-style="italic" font-size="24" fill="#2B2520">a celula fundamental.</text>

  <!-- Descricao esquerda -->
  <g transform="translate(90,410)">
    <g font-family="'IBM Plex Serif', serif" font-size="17" fill="#2B2520">
      <text x="0" y="0">O hexagono regular eh a forma mais eficiente de preencher</text>
      <text x="0" y="28">um plano sem desperdicio — a colmeia, a estrutura molecular</text>
      <text x="0" y="56">do carbono, o reator quimico visto de cima.</text>
      <text x="0" y="100">Nao aparece como icone. Aparece como infraestrutura.</text>
    </g>

    <g transform="translate(0,160)" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520" letter-spacing="3">
      <text x="0" y="0" fill="#E0B03A">· COTAS CANONICAS</text>
      <g font-family="'IBM Plex Mono'" font-size="12" fill="#2B2520">
        <text x="0" y="30">R · raio ao vertice = 120</text>
        <text x="0" y="54">h · altura aparente  = 208</text>
        <text x="0" y="78">Θ · angulo interno    =  60°</text>
        <text x="0" y="102">s · comprimento aresta = 120</text>
      </g>
    </g>

    <g transform="translate(0,330)" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520" letter-spacing="3">
      <text x="0" y="0" fill="#E0B03A">· PROPORCAO DE CONSTRUCAO</text>
      <text x="0" y="24" font-family="'IBM Plex Serif', serif" font-style="italic" font-size="14">dois hexagonos partilham uma aresta = reator.</text>
      <text x="0" y="48" font-family="'IBM Plex Serif', serif" font-style="italic" font-size="14">seis hexagonos circundam um centro = colmeia.</text>
      <text x="0" y="72" font-family="'IBM Plex Serif', serif" font-style="italic" font-size="14">gota dourada habita o centro = mercurio.</text>
    </g>
  </g>

  <!-- Diagrama direita: hex com cotas + grade -->
  <g transform="translate(1150,600)">
    <!-- Hex grande -->
    <polygon points="180,0 90,-156 -90,-156 -180,0 -90,156 90,156" fill="none" stroke="#2B2520" stroke-width="2.2"/>
    <polygon points="170,0 85,-147 -85,-147 -170,0 -85,147 85,147" fill="none" stroke="#2B2520" stroke-width="0.4" opacity="0.6"/>

    <!-- diagonais -->
    <g stroke="#2B2520" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.7">
      <line x1="-180" y1="0" x2="180" y2="0"/>
      <line x1="0" y1="-156" x2="0" y2="156"/>
      <line x1="-90" y1="-156" x2="90" y2="156"/>
      <line x1="90" y1="-156" x2="-90" y2="156"/>
    </g>

    <!-- vertices -->
    <g fill="#2B2520">
      <circle cx="180" cy="0" r="3"/><circle cx="-180" cy="0" r="3"/>
      <circle cx="90" cy="-156" r="3"/><circle cx="-90" cy="-156" r="3"/>
      <circle cx="90" cy="156" r="3"/><circle cx="-90" cy="156" r="3"/>
      <circle r="3"/>
    </g>

    <!-- reator central amarelo -->
    <circle r="18" fill="#E0B03A" stroke="#2B2520" stroke-width="1"/>

    <!-- cotas -->
    <g stroke="#2B2520" stroke-width="0.5">
      <line x1="0" y1="-180" x2="180" y2="-180"/>
      <line x1="0" y1="-186" x2="0" y2="-174"/>
      <line x1="180" y1="-186" x2="180" y2="-174"/>
    </g>
    <text x="90" y="-190" text-anchor="middle" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520">R = 120</text>

    <g stroke="#2B2520" stroke-width="0.5">
      <line x1="205" y1="-156" x2="205" y2="156"/>
      <line x1="199" y1="-156" x2="211" y2="-156"/>
      <line x1="199" y1="156" x2="211" y2="156"/>
    </g>
    <text x="220" y="5" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520">h = 208</text>
  </g>

  <!-- Honeycomb pattern como decoracao lateral -->
  <g transform="translate(700,400)" stroke="#2B2520" fill="none" stroke-width="0.4" opacity="0.3">
    <polygon points="30,0 15,-26 -15,-26 -30,0 -15,26 15,26"/>
    <polygon points="60,52 45,26 15,26 0,52 15,78 45,78"/>
    <polygon points="-60,52 -45,26 -15,26 0,52 -15,78 -45,78"/>
    <polygon points="0,104 -15,78 15,78 30,104 15,130 -15,130"/>
    <polygon points="90,0 75,-26 45,-26 60,-52 90,-52 105,-26"/>
    <polygon points="-90,0 -75,-26 -45,-26 -60,-52 -90,-52 -105,-26"/>
  </g>

  <line x1="90" y1="990" x2="1510" y2="990" stroke="#2B2520" stroke-width="0.4"/>
  <text x="90" y="1012" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520" letter-spacing="3">TIMELABSBR.COM</text>
  <text x="1510" y="1012" text-anchor="end" font-family="'Instrument Serif'" font-style="italic" font-size="14" fill="#2B2520">VIII</text>
</svg>
