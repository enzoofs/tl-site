<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs><filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="1.7" numOctaves="2" seed="7"/><feColorMatrix values="0 0 0 0 0.14  0 0 0 0 0.11  0 0 0 0 0.08  0 0 0 0.05 0"/></filter></defs>
  <rect width="1600" height="1100" fill="#EFE9DA"/>
  <rect width="1600" height="1100" filter="url(#paper)"/>

  <text x="90" y="118" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">TIMELABS · GLIFOS OPERACIONAIS</text>
  <text x="1510" y="118" text-anchor="end" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">FOLIO 07 / 10</text>
  <line x1="90" y1="136" x2="1510" y2="136" stroke="#2B2520" stroke-width="0.4"/>

  <text x="90" y="210" font-family="'IBM Plex Mono'" font-size="12" fill="#E0B03A" letter-spacing="8">§ VII · SIGILOS</text>
  <text x="90" y="290" font-family="'Gloock', serif" font-size="56" fill="#2B2520">Seis operacoes.</text>
  <text x="90" y="335" font-family="'Instrument Serif', serif" font-style="italic" font-size="24" fill="#2B2520">cada uma um glifo, cada um uma chancela.</text>

  <!-- Grid 3x2 de glifos ampliados -->
  <g transform="translate(90,420)">
    <!-- TRANSMUTAR -->
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="440" height="250" fill="none" stroke="#2B2520" stroke-width="0.4"/>
      <g transform="translate(90,125)" stroke="#2B2520" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="0,-35 30,22 -30,22"/>
        <line x1="-38" y1="-5" x2="38" y2="-5"/>
      </g>
      <text x="180" y="90" font-family="'Gloock', serif" font-size="34" fill="#2B2520">I · Transmutar</text>
      <text x="180" y="118" font-family="'Instrument Serif', serif" font-style="italic" font-size="16" fill="#6B6258">converter</text>
      <g font-family="'IBM Plex Serif', serif" font-size="13" fill="#2B2520">
        <text x="180" y="150">De processo manual</text>
        <text x="180" y="170">para fluxo automatizado.</text>
      </g>
      <text x="180" y="220" font-family="'IBM Plex Mono'" font-size="9" fill="#6B6258" letter-spacing="3">CODIGO I · BASE</text>
    </g>

    <!-- INTEGRAR -->
    <g transform="translate(480,0)">
      <rect x="0" y="0" width="440" height="250" fill="none" stroke="#2B2520" stroke-width="0.4"/>
      <g transform="translate(90,125)" stroke="#2B2520" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="-30" y1="22" x2="0" y2="-27"/>
        <line x1="0" y1="-27" x2="30" y2="22"/>
        <line x1="-30" y1="22" x2="30" y2="22"/>
        <circle cx="-30" cy="22" r="6" fill="#2B2520"/>
        <circle cx="30" cy="22" r="6" fill="#2B2520"/>
        <circle cx="0" cy="-27" r="6" fill="#2B2520"/>
      </g>
      <text x="180" y="90" font-family="'Gloock', serif" font-size="34" fill="#2B2520">II · Integrar</text>
      <text x="180" y="118" font-family="'Instrument Serif', serif" font-style="italic" font-size="16" fill="#6B6258">conectar</text>
      <g font-family="'IBM Plex Serif', serif" font-size="13" fill="#2B2520">
        <text x="180" y="150">Sistemas dispersos</text>
        <text x="180" y="170">falando a mesma lingua.</text>
      </g>
      <text x="180" y="220" font-family="'IBM Plex Mono'" font-size="9" fill="#6B6258" letter-spacing="3">CODIGO II · REDE</text>
    </g>

    <!-- OTIMIZAR -->
    <g transform="translate(960,0)">
      <rect x="0" y="0" width="440" height="250" fill="none" stroke="#2B2520" stroke-width="0.4"/>
      <g transform="translate(90,125)" stroke="#2B2520" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="0,-27 30,0 0,27 -30,0"/>
        <line x1="-16" y1="0" x2="16" y2="0"/>
      </g>
      <text x="180" y="90" font-family="'Gloock', serif" font-size="34" fill="#2B2520">III · Otimizar</text>
      <text x="180" y="118" font-family="'Instrument Serif', serif" font-style="italic" font-size="16" fill="#6B6258">refinar</text>
      <g font-family="'IBM Plex Serif', serif" font-size="13" fill="#2B2520">
        <text x="180" y="150">Comprimir passos</text>
        <text x="180" y="170">sem perder precisao.</text>
      </g>
      <text x="180" y="220" font-family="'IBM Plex Mono'" font-size="9" fill="#6B6258" letter-spacing="3">CODIGO III · EIXO</text>
    </g>

    <!-- ANALISAR -->
    <g transform="translate(0,280)">
      <rect x="0" y="0" width="440" height="250" fill="none" stroke="#2B2520" stroke-width="0.4"/>
      <g transform="translate(90,125)" stroke="#2B2520" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <ellipse rx="35" ry="18"/>
        <circle r="8" fill="#E0B03A"/>
        <line x1="0" y1="-28" x2="0" y2="-19"/>
        <line x1="0" y1="19" x2="0" y2="28"/>
      </g>
      <text x="180" y="90" font-family="'Gloock', serif" font-size="34" fill="#2B2520">IV · Analisar</text>
      <text x="180" y="118" font-family="'Instrument Serif', serif" font-style="italic" font-size="16" fill="#6B6258">observar</text>
      <g font-family="'IBM Plex Serif', serif" font-size="13" fill="#2B2520">
        <text x="180" y="150">Dados que viram</text>
        <text x="180" y="170">entendimento.</text>
      </g>
      <text x="180" y="220" font-family="'IBM Plex Mono'" font-size="9" fill="#6B6258" letter-spacing="3">CODIGO IV · OLHO</text>
    </g>

    <!-- CICLAR -->
    <g transform="translate(480,280)">
      <rect x="0" y="0" width="440" height="250" fill="none" stroke="#2B2520" stroke-width="0.4"/>
      <g transform="translate(90,125)" stroke="#2B2520" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 28,0 A 28,28 0 1,1 0,-28"/>
        <polyline points="-11,-33 0,-28 -5,-17"/>
      </g>
      <text x="180" y="90" font-family="'Gloock', serif" font-size="34" fill="#2B2520">V · Ciclar</text>
      <text x="180" y="118" font-family="'Instrument Serif', serif" font-style="italic" font-size="16" fill="#6B6258">recomecar</text>
      <g font-family="'IBM Plex Serif', serif" font-size="13" fill="#2B2520">
        <text x="180" y="150">Processo vira ritual.</text>
        <text x="180" y="170">Ritual vira sistema.</text>
      </g>
      <text x="180" y="220" font-family="'IBM Plex Mono'" font-size="9" fill="#6B6258" letter-spacing="3">CODIGO V · VOLTA</text>
    </g>

    <!-- REGISTRAR -->
    <g transform="translate(960,280)">
      <rect x="0" y="0" width="440" height="250" fill="none" stroke="#2B2520" stroke-width="0.4"/>
      <g transform="translate(90,125)" stroke="#2B2520" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="0" y1="-28" x2="0" y2="28"/>
        <path d="M 0,-28 L -33,-19 L -33,31 L 0,28"/>
        <path d="M 0,-28 L 33,-19 L 33,31 L 0,28"/>
      </g>
      <text x="180" y="90" font-family="'Gloock', serif" font-size="34" fill="#2B2520">VI · Registrar</text>
      <text x="180" y="118" font-family="'Instrument Serif', serif" font-style="italic" font-size="16" fill="#6B6258">catalogar</text>
      <g font-family="'IBM Plex Serif', serif" font-size="13" fill="#2B2520">
        <text x="180" y="150">Todo fluxo deixa marca.</text>
        <text x="180" y="170">Toda marca ensina.</text>
      </g>
      <text x="180" y="220" font-family="'IBM Plex Mono'" font-size="9" fill="#6B6258" letter-spacing="3">CODIGO VI · CODEX</text>
    </g>
  </g>

  <line x1="90" y1="990" x2="1510" y2="990" stroke="#2B2520" stroke-width="0.4"/>
  <text x="90" y="1012" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520" letter-spacing="3">TIMELABSBR.COM</text>
  <text x="1510" y="1012" text-anchor="end" font-family="'Instrument Serif'" font-style="italic" font-size="14" fill="#2B2520">VII</text>
</svg>
