<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs><filter id="paper"><feTurbulence type="fractalNoise" baseFrequency="1.7" numOctaves="2" seed="3"/><feColorMatrix values="0 0 0 0 0.14  0 0 0 0 0.11  0 0 0 0 0.08  0 0 0 0.05 0"/></filter></defs>
  <rect width="1600" height="1100" fill="#EFE9DA"/>
  <rect width="1600" height="1100" filter="url(#paper)"/>

  <text x="90" y="118" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">TIMELABS · LOGOTIPO PRINCIPAL</text>
  <text x="1510" y="118" text-anchor="end" font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="4">FOLIO 03 / 10</text>
  <line x1="90" y1="136" x2="1510" y2="136" stroke="#2B2520" stroke-width="0.4"/>

  <text x="90" y="210" font-family="'IBM Plex Mono'" font-size="12" fill="#E0B03A" letter-spacing="8">§ III · WORDMARK</text>
  <text x="90" y="280" font-family="'Gloock', serif" font-size="56" fill="#2B2520">O wordmark canonico</text>

  <!-- Wordmark em escala grande -->
  <g transform="translate(90,380)">
    <text x="0" y="140" font-family="'Gloock', 'IBM Plex Serif', serif" font-size="180" fill="#2B2520">t</text>
    <text x="85" y="140" font-family="'Gloock', 'IBM Plex Serif', serif" font-size="180" fill="#2B2520">ı</text>
    <g transform="translate(107,3)">
      <polygon points="14,0 7,-12 -7,-12 -14,0 -7,12 7,12" fill="#E0B03A" stroke="#2B2520" stroke-width="1.8"/>
      <circle r="2.2" fill="#2B2520"/>
    </g>
    <text x="135" y="140" font-family="'Gloock', 'IBM Plex Serif', serif" font-size="180" fill="#2B2520">melabs</text>
  </g>

  <line x1="90" y1="600" x2="1510" y2="600" stroke="#2B2520" stroke-width="0.5"/>

  <!-- Anotacoes laterais como codice -->
  <g font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="3">
    <!-- coluna 1 -->
    <text x="90" y="670" fill="#E0B03A">· CONSTRUCAO</text>
    <text x="90" y="700">Gloock Regular ou IBM Plex Serif</text>
    <text x="90" y="722">Caixa-baixa · 180pt</text>
    <text x="90" y="744">Kerning manual entre 't · i'</text>
    <text x="90" y="766">Tittle do 'i' substituido por hex</text>

    <!-- coluna 2 -->
    <text x="560" y="670" fill="#E0B03A">· COR</text>
    <text x="560" y="700">Tinta: #2B2520</text>
    <text x="560" y="722">Mercurio: #E0B03A</text>
    <text x="560" y="744">Papel: #EFE9DA</text>
    <text x="560" y="766">Nunca usar em gradiente</text>

    <!-- coluna 3 -->
    <text x="1020" y="670" fill="#E0B03A">· USO</text>
    <text x="1020" y="700">Cabecalho de site</text>
    <text x="1020" y="722">Documentos e apresentacoes</text>
    <text x="1020" y="744">Assinaturas comerciais</text>
    <text x="1020" y="766">Tamanho minimo: 120px largura</text>
  </g>

  <!-- Area de respiro demonstrada -->
  <g transform="translate(90,830)">
    <text x="0" y="0" font-family="'IBM Plex Mono'" font-size="11" fill="#E0B03A" letter-spacing="3">· AREA DE RESPIRO</text>
    <g transform="translate(0,20)">
      <!-- wordmark mini -->
      <text x="40" y="78" font-family="'Gloock', serif" font-size="86" fill="#2B2520">timelabs</text>
      <!-- marcadores -->
      <g stroke="#E0B03A" stroke-width="0.8" stroke-dasharray="4 3" fill="none">
        <rect x="20" y="20" width="500" height="80"/>
      </g>
      <g font-family="'IBM Plex Mono'" font-size="9" fill="#2B2520" opacity="0.6" letter-spacing="2">
        <text x="0" y="14">X/2</text>
        <text x="542" y="70" text-anchor="start">= ALTURA DO 'L'</text>
      </g>
    </g>
  </g>

  <line x1="90" y1="990" x2="1510" y2="990" stroke="#2B2520" stroke-width="0.4"/>
  <text x="90" y="1012" font-family="'IBM Plex Mono'" font-size="10" fill="#2B2520" letter-spacing="3">TIMELABSBR.COM</text>
  <text x="1510" y="1012" text-anchor="end" font-family="'Instrument Serif'" font-style="italic" font-size="14" fill="#2B2520">III</text>
</svg>
