  <text x="90" y="210" font-family="'IBM Plex Mono'" font-size="12" fill="#E0B03A" letter-spacing="8">§ IV · INSIGNIA</text>

  <!-- Explanation left -->
  <g>
    <text x="90" y="290" font-family="'Gloock', serif" font-size="56" fill="#2B2520">O Selo.</text>
    <text x="90" y="360" font-family="'Instrument Serif', serif" font-style="italic" font-size="26" fill="#2B2520">assinatura institucional,</text>
    <text x="90" y="395" font-family="'Instrument Serif', serif" font-style="italic" font-size="26" fill="#2B2520">carimbo, chancela.</text>
    <line x1="90" y1="430" x2="280" y2="430" stroke="#2B2520" stroke-width="0.5"/>

    <g font-family="'IBM Plex Serif', serif" font-size="17" fill="#2B2520">
      <text x="90" y="480">Insignia circular com orbita tipografica,</text>
      <text x="90" y="505">seis glifos nos vertices do hexagono central</text>
      <text x="90" y="530">e reator dourado com monograma TL.</text>
      <text x="90" y="575">Cada glifo representa uma operacao fundamental:</text>
    </g>

    <g font-family="'IBM Plex Mono'" font-size="13" fill="#2B2520" letter-spacing="4">
      <text x="90" y="615">· TRANSMUTAR · INTEGRAR · OTIMIZAR</text>
      <text x="90" y="640">· ANALISAR · CICLAR · REGISTRAR</text>
    </g>

    <g font-family="'IBM Plex Mono'" font-size="11" fill="#2B2520" letter-spacing="3" opacity="0.75">
      <text x="90" y="725" fill="#E0B03A">· USO</text>
      <text x="90" y="750">Assinatura de propostas e documentos</text>
      <text x="90" y="772">Carimbo/selo em materiais institucionais</text>
      <text x="90" y="794">Footer de site e apresentacoes</text>
      <text x="90" y="816">Favicon em tamanho grande</text>
      <text x="90" y="840">Nunca inverter ou distorcer</text>
    </g>
  </g>

