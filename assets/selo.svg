<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 680" width="600" height="680">
  <defs>
    <!-- Textura de papel: ruido fractal sutil -->
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" values="0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.06 0"/>
    </filter>
    <!-- Sombra sutil para dar volume de tinta -->
    <filter id="ink" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
  </defs>

  <!-- Papel fundo -->
  <rect width="600" height="680" fill="#EFE9DA"/>
  <rect width="600" height="680" filter="url(#paper)"/>

