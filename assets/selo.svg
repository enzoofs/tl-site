    <!-- Separadores estrela nos 4 polos cardinais -->
    <g fill="#2B2520">
      <circle cx="0" cy="-198" r="2.2"/>
      <circle cx="198" cy="0" r="2.2"/>
      <circle cx="0" cy="198" r="2.2"/>
      <circle cx="-198" cy="0" r="2.2"/>
    </g>

    <!-- 6 glifos customizados nos vertices do hex (cada um = operacao TimeLabs) -->
    <g stroke="#2B2520" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

      <!-- N: TRANSMUTAR — triangulo ascendente atravessado -->
      <g transform="translate(0,-145)">
        <polygon points="0,-13 11,8 -11,8"/>
        <line x1="-14" y1="-2" x2="14" y2="-2"/>
      </g>

      <!-- NE: INTEGRAR — 3 pontos conectados -->
      <g transform="translate(125,-72)">
        <line x1="-11" y1="8" x2="0" y2="-10"/>
        <line x1="0" y1="-10" x2="11" y2="8"/>
        <line x1="-11" y1="8" x2="11" y2="8"/>
        <circle cx="-11" cy="8" r="2.5" fill="#2B2520"/>
        <circle cx="11" cy="8" r="2.5" fill="#2B2520"/>
        <circle cx="0" cy="-10" r="2.5" fill="#2B2520"/>
      </g>

      <!-- SE: OTIMIZAR — diamante comprimido com barra horizontal -->
      <g transform="translate(125,72)">
        <polygon points="0,-10 11,0 0,10 -11,0"/>
        <line x1="-6" y1="0" x2="6" y2="0"/>
      </g>

      <!-- S: ANALISAR — olho com crosshair -->
      <g transform="translate(0,145)">
        <ellipse rx="13" ry="7"/>
        <circle r="3"/>
        <line x1="0" y1="-11" x2="0" y2="-7"/>
        <line x1="0" y1="7" x2="0" y2="11"/>
      </g>

      <!-- SW: CICLAR — seta circular -->
      <g transform="translate(-125,72)">
        <path d="M 10,0 A 10,10 0 1,1 0,-10"/>
        <polyline points="-4,-12 0,-10 -2,-6"/>
      </g>

      <!-- NW: REGISTRAR — codex aberto -->
      <g transform="translate(-125,-72)">
        <line x1="0" y1="-10" x2="0" y2="10"/>
        <path d="M 0,-10 L -12,-7 L -12,11 L 0,10"/>
        <path d="M 0,-10 L 12,-7 L 12,11 L 0,10"/>
      </g>
    </g>

    <!-- Linhas radiais finas ligando glifos ao nucleo -->
    <g stroke="#2B2520" stroke-width="0.35" opacity="0.55">
      <line x1="0" y1="-132" x2="0" y2="-80"/>
      <line x1="114" y1="-66" x2="70" y2="-41"/>
      <line x1="114" y1="66" x2="70" y2="41"/>
      <line x1="0" y1="132" x2="0" y2="80"/>
      <line x1="-114" y1="66" x2="-70" y2="41"/>
      <line x1="-114" y1="-66" x2="-70" y2="-41"/>
    </g>

    <!-- Hexagono central (o reator) -->
    <polygon points="80,0 40,-69.3 -40,-69.3 -80,0 -40,69.3 40,69.3"
             fill="#EFE9DA" stroke="#2B2520" stroke-width="2.2"/>
    <polygon points="76,0 38,-65.8 -38,-65.8 -76,0 -38,65.8 38,65.8"
             fill="none" stroke="#2B2520" stroke-width="0.5"/>

    <!-- Gota de mercurio amarela no centro -->
    <circle r="22" fill="#E0B03A"/>
    <circle r="22" fill="none" stroke="#2B2520" stroke-width="1.2"/>
    <circle r="18" fill="none" stroke="#2B2520" stroke-width="0.3" opacity="0.6"/>

    <!-- Monograma TL em Gloock (didone alta classe) -->
    <text x="0" y="11" text-anchor="middle"
          font-family="'Gloock', 'IBM Plex Serif', serif"
          font-size="40" fill="#2B2520" letter-spacing="-1">TL</text>
  </g>

  <!-- Wordmark logo abaixo do selo -->
  <g transform="translate(300,595)" text-anchor="middle">
    <text font-family="'Gloock', 'IBM Plex Serif', serif"
          font-size="38" fill="#2B2520" letter-spacing="2">TIMELABS</text>
    <text y="28" font-family="'IBM Plex Mono'" font-size="10"
          fill="#2B2520" letter-spacing="6" opacity="0.85">
      ·  A  ALQUIMIA  DO  TEMPO  ·
    </text>
  </g>

  <!-- Marca catalogadora no canto -->
  <text x="40" y="655" font-family="'IBM Plex Mono'" font-size="8"
        fill="#2B2520" letter-spacing="3" opacity="0.5">
